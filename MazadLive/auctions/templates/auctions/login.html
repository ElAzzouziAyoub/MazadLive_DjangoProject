{% extends "auctions/base.html" %}
{% block title %}Login — MazadLive{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-4 text-center">Login</h3>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          {% if form.errors %}
          <div class="alert alert-danger py-2">Invalid username or password.</div>
          {% endif %}
          <button class="btn btn-primary w-100 fw-bold" type="submit">Login</button>
        </form>
        <hr>
        <p class="text-center mb-0">Don't have an account? <a href="/register/">Register</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
