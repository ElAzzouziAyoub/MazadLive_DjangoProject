{% extends "auctions/base.html" %}
{% block title %}Create Listing — MazadLive{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h3 class="fw-bold mb-4">List an Item for Auction</h3>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" maxlength="300" required
              value="{{ form_data.title|default:'' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="4">{{ form_data.description|default:'' }}</textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Category</label>
              <select name="category" class="form-select" required>
                <option value="">-- Select --</option>
                {% for cat in categories %}
                  <option value="{{ cat.pk }}" {% if form_data.category == cat.pk|stringformat:"s" %}selected{% endif %}>
                    {{ cat.name }}
                  </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Starting Price (MAD)</label>
              <input type="number" name="starting_price" class="form-control"
                step="0.01" min="0.01" required value="{{ form_data.starting_price|default:'' }}">
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Reserve Price (MAD) <span class="text-muted fw-normal">(optional)</span></label>
              <input type="number" name="reserve_price" class="form-control"
                step="0.01" min="0" value="{{ form_data.reserve_price|default:'' }}">
            </div>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Start Time</label>
              <input type="datetime-local" name="start_time" class="form-control" required
                value="{{ form_data.start_time|default:'' }}">
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">End Time</label>
              <input type="datetime-local" name="end_time" class="form-control" required
                value="{{ form_data.end_time|default:'' }}">
            </div>
          </div>
          {% if errors %}
          <div class="alert alert-danger">
            {% for e in errors %}<div>{{ e }}</div>{% endfor %}
          </div>
          {% endif %}
          <button class="btn btn-warning fw-bold w-100" type="submit">
            <i class="bi bi-plus-circle"></i> Create Listing
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
